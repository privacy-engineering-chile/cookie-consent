<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cookie-consent-cl · Google Consent Mode</title>
    <link rel="stylesheet" href="../../styles/cookie-consent-cl.css" />
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        window.dataLayer.push(arguments);
        console.log("gtag", arguments);
      }
      window.gtag = gtag;
    </script>
  </head>
  <body>
    <main>
      <h1>Google Consent Mode v2</h1>
      <p>El ejemplo registra llamadas consent default/update en consola y dataLayer.</p>
      <button type="button" onclick="CookieConsentCL.openPreferences()">Cambiar preferencias</button>
      <p>
        Cookies de muestra:
        <strong id="cookie-status">sin decision</strong>
      </p>
    </main>
    <script type="module">
      import { CookieConsentCL } from "../../src/index.ts";
      const params = new URLSearchParams(window.location.search);

      function setSampleCookie(name, value) {
        document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; path=/; SameSite=Lax`;
      }

      const sampleCookieNames = ["cccl_gcm_analytics", "cccl_gcm_marketing", "cccl_gcm_preferences"];

      function updateSampleCookies(consent) {
        if (consent.categories.analytics) setSampleCookie("cccl_gcm_analytics", "accepted");
        if (consent.categories.marketing) setSampleCookie("cccl_gcm_marketing", "accepted");
        if (consent.categories.preferences) setSampleCookie("cccl_gcm_preferences", "accepted");
        const visibleCookies = sampleCookieNames.filter((name) => document.cookie.includes(`${name}=accepted`));
        document.querySelector("#cookie-status").textContent = visibleCookies.join("; ") || "sin cookies no necesarias";
      }

      CookieConsentCL.init({
        siteId: params.get("siteId") || "demo-google-consent-mode",
        policyVersion: "2026-01-01",
        bannerVersion: "1.0.0",
        cookies: [
          {
            name: "cccl_gcm_analytics",
            provider: "Demo local",
            category: "analytics",
            duration: "Sesion",
            purpose: "Probar una cookie de analitica junto a Google Consent Mode."
          },
          {
            name: "cccl_gcm_marketing",
            provider: "Demo local",
            category: "marketing",
            duration: "Sesion",
            purpose: "Probar cookies de marketing junto a Google Consent Mode."
          },
          {
            name: "cccl_gcm_preferences",
            provider: "Demo local",
            category: "preferences",
            duration: "Sesion",
            purpose: "Probar una cookie de preferencias."
          }
        ],
        onConsentChange: updateSampleCookies
      });
    </script>
  </body>
</html>
