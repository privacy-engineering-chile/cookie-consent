<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../styles/cookie-consent-cl.css" />
    <style>
      :root {
        background: #eef4ff;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 10%, rgba(37, 99, 235, 0.16), transparent 22rem),
          radial-gradient(circle at 92% 16%, rgba(16, 185, 129, 0.14), transparent 20rem),
          linear-gradient(135deg, #f8fafc 0%, #edf7ff 54%, #f8fafc 100%);
      }

      .site {
        position: relative;
        min-height: 100vh;
        padding: 0;
      }

      .site-shell {
        min-height: 100vh;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: rgba(255, 255, 255, 0.62);
        box-shadow: none;
        backdrop-filter: blur(18px);
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 20px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(255, 255, 255, 0.72);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 900;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: linear-gradient(135deg, #2563eb, #10b981);
      }

      .nav {
        display: flex;
        gap: 10px;
      }

      .nav span,
      .content-line,
      .content-card span {
        display: block;
        border-radius: 999px;
        background: #dbeafe;
      }

      .nav span {
        width: 62px;
        height: 10px;
      }

      .site-content {
        display: grid;
        gap: 20px;
        padding: 34px 26px 160px;
      }

      .content-line {
        height: 22px;
        width: min(72%, 520px);
        background: #bfdbfe;
      }

      .content-line:nth-child(2) {
        width: min(48%, 360px);
        height: 14px;
        background: #dbeafe;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .content-hero {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(180px, 0.9fr);
        gap: 20px;
        align-items: stretch;
        min-height: 180px;
      }

      .hero-panel,
      .metric-panel {
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 20px 70px rgba(15, 23, 42, 0.09);
      }

      .hero-panel {
        display: grid;
        align-content: center;
        gap: 16px;
        padding: 28px;
      }

      .metric-panel {
        display: grid;
        gap: 12px;
        padding: 22px;
      }

      .content-card {
        min-height: 150px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 20px;
        padding: 18px;
        background: #ffffff;
      }

      .content-card span {
        height: 12px;
        margin-bottom: 12px;
      }

      .content-card span:first-child {
        width: 74%;
        background: #bfdbfe;
      }

      .content-card span:nth-child(2) {
        width: 92%;
      }

      .content-card span:nth-child(3) {
        width: 54%;
      }

      @media (max-width: 700px) {
        .site-shell {
          min-height: 100vh;
        }

        .nav {
          display: none;
        }

        .content-grid {
          grid-template-columns: 1fr;
        }

        .content-hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="site" aria-hidden="true">
      <div class="site-shell">
        <header class="site-header">
          <div class="brand"><span class="brand-mark"></span> Sitio demo</div>
          <nav class="nav"><span></span><span></span><span></span></nav>
        </header>
        <section class="site-content">
          <div class="content-hero">
            <div class="hero-panel">
              <span class="content-line"></span>
              <span class="content-line"></span>
              <span class="content-line"></span>
            </div>
            <div class="metric-panel">
              <span class="content-line"></span>
              <span class="content-line"></span>
              <span class="content-line"></span>
              <span class="content-line"></span>
            </div>
          </div>
          <div class="content-grid">
            <article class="content-card"><span></span><span></span><span></span></article>
            <article class="content-card"><span></span><span></span><span></span></article>
            <article class="content-card"><span></span><span></span><span></span></article>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import { COOKIE_CONSENT_CL_VERSION } from "./version.js";

      const { CookieConsentCL } = await import(
        `https://cdn.jsdelivr.net/npm/cookie-consent-cl@${COOKIE_CONSENT_CL_VERSION}/dist/cookie-consent-cl.es.js`
      );

      const defaultConfig = {
        siteId: "preview-site",
        language: "es-CL",
        policyVersion: "2026-01-01",
        bannerVersion: "1.0.0",
        ethicalMode: true,
        position: "bottom",
        theme: {
          primaryColor: "#533be2",
          backgroundColor: "#ffffff",
          textColor: "#4b494b"
        },
        cookieIcon: {
          enabled: true,
          position: "bottom-left",
          colorScheme: "primary-on-background"
        },
        animation: {
          enabled: true,
          type: "cookie-comet"
        },
        categories: [
          {
            id: "necessary",
            label: "Necesarias",
            description: "Permiten que el sitio funcione correctamente y no se pueden desactivar.",
            required: true
          },
          {
            id: "analytics",
            label: "Analitica",
            description: "Nos ayudan a entender como se usa el sitio.",
            required: false,
            defaultValue: false
          }
        ],
        cookies: [
          {
            name: "_ga",
            provider: "Google Analytics",
            category: "analytics",
            duration: "2 anos",
            purpose: "Distinguir usuarios para generar estadisticas de uso del sitio."
          }
        ],
        text: {
          bannerTitle: "Preferencias de cookies",
          bannerDescription:
            "Usamos cookies necesarias para que este sitio funcione. Con tu autorizacion, tambien podemos usar cookies de analitica, marketing o preferencias.",
          acceptAll: "Aceptar todas",
          rejectNonEssential: "Rechazar no necesarias",
          configure: "Configurar",
          savePreferences: "Guardar preferencias",
          close: "Cerrar",
          preferencesTitle: "Configura tus preferencias",
          preferencesDescription: "Puedes elegir que categorias de cookies autorizar."
        }
      };

      function clearCookieUi() {
        [
          "#cccl-banner",
          "#cccl-banner-backdrop",
          "#cccl-modal-root",
          "#cccl-preferences-notice",
          "#cccl-cookie-icon",
          "#cccl-cookie-comet",
          "#cccl-cookie-comet-trail"
        ].forEach((selector) => document.querySelector(selector)?.remove());
      }

      function applyDesign(design) {
        const radius = `${design?.borderRadius ?? 18}px`;
        document.documentElement.style.setProperty("--preview-radius", radius);
        const style = document.querySelector("#preview-radius-style") || document.createElement("style");
        style.id = "preview-radius-style";
        style.textContent = `
          .cccl-banner,
          .cccl-modal,
          .cccl-preferences-notice,
          .cccl-cookie-icon {
            border-radius: var(--preview-radius) !important;
          }
        `;
        document.head.append(style);
      }

      function renderMode(mode) {
        if (mode === "preferences") {
          CookieConsentCL.resetConsent();
          CookieConsentCL.openPreferences();
          window.parent.postMessage({ type: "cccl-preview-mode", mode: "preferences" }, "*");
          return;
        }

        if (mode === "icon") {
          CookieConsentCL.acceptAll();
          document.querySelector("#cccl-preferences-notice")?.remove();
          return;
        }

        if (mode === "transition") {
          CookieConsentCL.resetConsent();
          requestAnimationFrame(() => CookieConsentCL.acceptAll());
          return;
        }

        if (mode === "saved-toast") {
          CookieConsentCL.acceptAll();
          document.querySelector("#cccl-preferences-notice")?.remove();
          document.querySelector("#cccl-cookie-icon")?.remove();
          return;
        }

        CookieConsentCL.resetConsent();
      }

      window.addEventListener("message", (event) => {
        if (event.data?.type !== "cccl-preview-config") return;
        clearCookieUi();
        applyDesign(event.data.design);
        CookieConsentCL.init(event.data.config);
        CookieConsentCL.onConsentChange(() => {
          window.parent.postMessage(
            {
              type: "cccl-preview-mode",
              mode: event.data.config.cookieIcon?.enabled ? "icon" : "saved-toast"
            },
            "*"
          );
        });
        renderMode(event.data.restart ? "banner" : event.data.mode || "banner");
      });

      document.addEventListener(
        "click",
        (event) => {
          const target = event.target;
          if (!(target instanceof Element)) return;
          const opensPreferences = target.closest('[data-action="configure"], .cccl-cookie-icon__button');
          if (!opensPreferences) return;
          window.setTimeout(() => {
            if (document.querySelector("#cccl-modal-root")) {
              window.parent.postMessage({ type: "cccl-preview-mode", mode: "preferences" }, "*");
            }
          }, 0);
        },
        true
      );

      applyDesign({ borderRadius: 18 });
      CookieConsentCL.init(defaultConfig);
      renderMode("banner");
      window.parent.postMessage({ type: "cccl-preview-ready" }, "*");
    </script>
  </body>
</html>
