<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../styles/cookie-consent-cl.css" />
    <style>
      :root {
        background: #eef4ff;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 10%, rgba(37, 99, 235, 0.18), transparent 22rem),
          radial-gradient(circle at 88% 18%, rgba(16, 185, 129, 0.16), transparent 19rem),
          linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      }

      .site {
        position: relative;
        min-height: 100vh;
        padding: 24px;
      }

      .site-shell {
        min-height: calc(100vh - 48px);
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 30px 90px rgba(15, 23, 42, 0.16);
        backdrop-filter: blur(18px);
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 20px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 900;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: linear-gradient(135deg, #2563eb, #10b981);
      }

      .nav {
        display: flex;
        gap: 10px;
      }

      .nav span,
      .content-line,
      .content-card span {
        display: block;
        border-radius: 999px;
        background: #dbeafe;
      }

      .nav span {
        width: 62px;
        height: 10px;
      }

      .site-content {
        display: grid;
        gap: 22px;
        padding: 34px 26px 140px;
      }

      .content-line {
        height: 22px;
        width: min(72%, 520px);
        background: #bfdbfe;
      }

      .content-line:nth-child(2) {
        width: min(48%, 360px);
        height: 14px;
        background: #dbeafe;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .content-card {
        min-height: 150px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 20px;
        padding: 18px;
        background: #ffffff;
      }

      .content-card span {
        height: 12px;
        margin-bottom: 12px;
      }

      .content-card span:first-child {
        width: 74%;
        background: #bfdbfe;
      }

      .content-card span:nth-child(2) {
        width: 92%;
      }

      .content-card span:nth-child(3) {
        width: 54%;
      }

      @media (max-width: 700px) {
        .site {
          padding: 12px;
        }

        .site-shell {
          min-height: calc(100vh - 24px);
          border-radius: 22px;
        }

        .nav {
          display: none;
        }

        .content-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="site" aria-hidden="true">
      <div class="site-shell">
        <header class="site-header">
          <div class="brand"><span class="brand-mark"></span> Sitio demo</div>
          <nav class="nav"><span></span><span></span><span></span></nav>
        </header>
        <section class="site-content">
          <span class="content-line"></span>
          <span class="content-line"></span>
          <div class="content-grid">
            <article class="content-card"><span></span><span></span><span></span></article>
            <article class="content-card"><span></span><span></span><span></span></article>
            <article class="content-card"><span></span><span></span><span></span></article>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import { CookieConsentCL } from "../../src/index.ts";

      function clearCookieUi() {
        [
          "#cccl-banner",
          "#cccl-banner-backdrop",
          "#cccl-modal-root",
          "#cccl-preferences-notice",
          "#cccl-cookie-icon"
        ].forEach((selector) => document.querySelector(selector)?.remove());
      }

      function applyDesign(design) {
        const radius = `${design?.borderRadius ?? 18}px`;
        document.documentElement.style.setProperty("--preview-radius", radius);
        const style = document.querySelector("#preview-radius-style") || document.createElement("style");
        style.id = "preview-radius-style";
        style.textContent = `
          .cccl-banner,
          .cccl-modal,
          .cccl-preferences-notice,
          .cccl-cookie-icon {
            border-radius: var(--preview-radius) !important;
          }
        `;
        document.head.append(style);
      }

      function renderMode(mode) {
        if (mode === "preferences") {
          CookieConsentCL.resetConsent();
          CookieConsentCL.openPreferences();
          return;
        }

        if (mode === "icon") {
          CookieConsentCL.acceptAll();
          document.querySelector("#cccl-preferences-notice")?.remove();
          return;
        }

        if (mode === "saved-toast") {
          CookieConsentCL.acceptAll();
          document.querySelector("#cccl-preferences-notice")?.remove();
          document.querySelector("#cccl-cookie-icon")?.remove();
          return;
        }

        CookieConsentCL.resetConsent();
      }

      window.addEventListener("message", (event) => {
        if (event.data?.type !== "cccl-preview-config") return;
        clearCookieUi();
        applyDesign(event.data.design);
        CookieConsentCL.init(event.data.config);
        CookieConsentCL.onConsentChange(() => {
          window.parent.postMessage(
            {
              type: "cccl-preview-mode",
              mode: event.data.config.cookieIcon?.enabled ? "icon" : "saved-toast"
            },
            "*"
          );
        });
        renderMode(event.data.restart ? "banner" : event.data.mode || "banner");
      });

      window.parent.postMessage({ type: "cccl-preview-ready" }, "*");
    </script>
  </body>
</html>
